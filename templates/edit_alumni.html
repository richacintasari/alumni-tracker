<!DOCTYPE html>
<html>
<head>

<title>Edit Alumni</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2>Edit Data Alumni</h2>

<form method="POST">

<div class="mb-3">

<label>Nama</label>
<input type="text" class="form-control" name="nama" value="{{alumni.nama}}">

</div>

<div class="mb-3">

<label>Program Studi</label>
<input type="text" class="form-control" name="prodi" value="{{alumni.prodi}}">

</div>

<div class="mb-3">

<label>Tahun Lulus</label>
<input type="text" class="form-control" name="tahun" value="{{alumni.tahun}}">

</div>

<button class="btn btn-success">
Update
</button>

<a href="/" class="btn btn-secondary">
Kembali
</a>

</form>

</div>

</body>
</html>
