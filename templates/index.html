<!DOCTYPE html>
<html>
<head>

<title>Sistem Pelacakan Alumni</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">
<div class="container-fluid">

<span class="navbar-brand">
Sistem Pelacakan Alumni
</span>

<a class="btn btn-success" href="/tambah">
Tambah Alumni
</a>

</div>
</nav>

<div class="container mt-4">

<h3>Data Alumni</h3>

<table class="table table-bordered table-striped">

<thead class="table-dark">

<tr>
<th>Nama</th>
<th>Prodi</th>
<th>Tahun</th>
<th>Status</th>
<th>Aksi</th>
</tr>

</thead>

<tbody>

{% for a in alumni %}

<tr>

<td>{{a.nama}}</td>
<td>{{a.prodi}}</td>
<td>{{a.tahun}}</td>
<td>{{a.status}}</td>

<td>

<a href="/lacak/{{a.id}}" class="btn btn-primary btn-sm">
Lacak
</a>

<a href="/edit/{{a.id}}" class="btn btn-warning btn-sm">
Edit
</a>

<a href="/delete/{{a.id}}" class="btn btn-danger btn-sm">
Delete
</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>
</html>
